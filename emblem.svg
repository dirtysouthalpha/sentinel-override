<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#080e1c" rx="20"/>
  <!-- Hexagon -->
  <polygon points="200,30 350,115 350,285 200,370 50,285 50,115" fill="none" stroke="#00d4ff" stroke-width="4" opacity="0.85"/>
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="100" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.5"/>
  <!-- Inner circle -->
  <circle cx="200" cy="200" r="55" fill="none" stroke="#00d4ff" stroke-width="3" opacity="0.9"/>
  <!-- Crosshairs -->
  <line x1="200" y1="80" x2="200" y2="140" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="260" x2="200" y2="320" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <line x1="80" y1="200" x2="140" y2="200" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <line x1="260" y1="200" x2="320" y2="200" stroke="#00d4ff" stroke-width="2" opacity="0.7"/>
  <!-- Diamond center -->
  <polygon points="200,170 230,200 200,230 170,200" fill="#080e1c" stroke="#00d4ff" stroke-width="3"/>
  <!-- Core dot -->
  <circle cx="200" cy="200" r="10" fill="#00d4ff"/>
  <!-- Magenta accent arc -->
  <path d="M200,100 A100,100 0 0,1 300,200" fill="none" stroke="#ff2a6d" stroke-width="3" opacity="0.6"/>
  <!-- Small corner dots -->
  <circle cx="130" cy="90" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="270" cy="90" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="130" cy="310" r="3" fill="#00d4ff" opacity="0.4"/>
  <circle cx="270" cy="310" r="3" fill="#00d4ff" opacity="0.4"/>
</svg>